schemaVersion: 1.2
endpoints:
  - name: open-fgc-service
    displayName: Open FGC Service
    service:
      basePath: /api/v1/
      port: 8080
    type: REST
    networkVisibilities:
      - Project
      - Public
    schemaFilePath: ../api/consent-management-API.yaml

dependencies:
  connectionReferences:
    - name: openfgc_db_connection
      resourceRef: database:healthcare-demo-db/openfgc_db

configurations:
  env:
    - name: OPENFGC_DB_CONNECTION_HOSTNAME
      valueFrom:
        connectionRef:
          name: openfgc_db_connection
          key: HostName
    - name: OPENFGC_DB_CONNECTION_PORT
      valueFrom:
        connectionRef:
          name: openfgc_db_connection
          key: Port
    - name: OPENFGC_DB_CONNECTION_USERNAME
      valueFrom:
        connectionRef:
          name: openfgc_db_connection
          key: Username
    - name: OPENFGC_DB_CONNECTION_PASSWORD
      valueFrom:
        connectionRef:
          name: openfgc_db_connection
          key: Password
    - name: OPENFGC_DB_CONNECTION_DATABASENAME
      valueFrom:
        connectionRef:
          name: openfgc_db_connection
          key: DatabaseName
